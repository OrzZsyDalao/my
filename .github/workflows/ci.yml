name: research-pipeline-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -r requirements.txt pytest
      - run: python -m py_compile source/main_analysis.py source/postprocess_candidate_output.py source/robustness_compare.py pipeline/*.py
      - run: python -m pytest -q
